name: CodSpeed Benchmarks

on:
  workflow_call:

jobs:
  simulation_python_3_13:
    name: simulation (Python 3.13)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build benchmark wheel for Python 3.13
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          manylinux: auto
          args: --release --out dist/python-3-13 -i 3.13
          rust-toolchain: nightly
          sccache: "true"

      - name: Clear sccache wrapper after Python 3.13 build
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Find benchmark wheel for Python 3.13
        id: python_3_13_wheel
        shell: bash
        run: |
          python_3_13_wheel_path=$(find dist/python-3-13 -name "*-cp313-*-manylinux*_x86_64.whl" -type f | head -n1)
          if [[ -z "$python_3_13_wheel_path" ]]; then
            python_3_13_wheel_path=$(find dist/python-3-13 -name "*-cp313-*-musllinux*_x86_64.whl" -type f | head -n1)
          fi
          if [[ -z "$python_3_13_wheel_path" ]]; then
            echo "No wheel found for Python 3.13 on Linux x86_64"
            exit 1
          fi
          echo "path=$python_3_13_wheel_path" >> "$GITHUB_OUTPUT"

      - name: Setup test environment for Python 3.13
        run: |
          uv venv --python 3.13 --clear
          uv sync --extra test --no-install-project
          uv pip install "${{ steps.python_3_13_wheel.outputs.path }}"

      - name: Test built wheel for Python 3.13
        run: uv run --no-sync pytest tests/ -vvv

      - name: Setup CodSpeed environment for Python 3.13
        run: |
          uv venv --python 3.13 --clear
          uv sync --extra test --no-install-project

      - name: Run CodSpeed simulation benchmarks for Python 3.13
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run --with "${{ steps.python_3_13_wheel.outputs.path }}" --no-sync pytest tests/ --codspeed -k test_performance -v

