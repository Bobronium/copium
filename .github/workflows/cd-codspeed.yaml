      - name: Setup CodSpeed memory environment for Python 3.14
        run: |
          uv venv --python 3.14 --clear
          uv sync --extra test --no-install-project

      # Wall-time mode is intentionally not enabled here because CodSpeed macro runners
      # currently require the repository to live under a GitHub organization.
      - name: Run CodSpeed memory benchmarks for Python 3.14
        uses: CodSpeedHQ/action@v4
        with:
          mode: memory
          run: uv run --with "${{ steps.python_3_14_wheel.outputs.path }}" --no-sync pytest tests/ --codspeed -k test_performance -v
